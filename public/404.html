<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Kauan Costa</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #030508;
        color: #e2e8f0;
        font-family: 'JetBrains Mono', monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .container { max-width: 480px; padding: 2rem; }
      .code  { font-size: 6rem; font-weight: 800; color: #00ff88; line-height: 1; margin-bottom: 1rem; }
      .msg   { color: #71717a; font-size: 0.875rem; margin-bottom: 2rem; line-height: 1.6; }
      .link  {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border: 1px solid rgba(0,255,136,0.3);
        border-radius: 0.75rem;
        color: #00ff88;
        text-decoration: none;
        font-size: 0.875rem;
        transition: background 0.2s;
      }
      .link:hover { background: rgba(0,255,136,0.08); }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <p class="msg">// Página não encontrada.<br/>Mas você chegou até aqui — isso conta. 👀</p>
      <a href="/" class="link">← Voltar ao início</a>
    </div>
  </body>
</html>
